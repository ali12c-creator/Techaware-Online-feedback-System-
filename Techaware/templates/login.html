<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechAware</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        min-height: 100vh;
        background: #0a0a14;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    .bg-image {
        position: fixed;
        inset: 0;
        background-image: url('/static/university.jpg');
        background-size: cover;
        background-position: center;
        filter: blur(3px) brightness(0.3);
        transform: scale(1.05);
        z-index: 0;
    }

    .bg-overlay {
        position: fixed;
        inset: 0;
        background: linear-gradient(
            135deg,
            rgba(10, 10, 20, 0.85) 0%,
            rgba(102, 126, 234, 0.15) 50%,
            rgba(10, 10, 20, 0.85) 100%
        );
        z-index: 1;
    }

    /* Animated background blobs */
    .bg-blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        animation: blobMove 8s ease-in-out infinite;
        z-index: 2;
    }

    .bg-blob-1 {
        width: 600px;
        height: 600px;
        background: #667eea;
        top: -200px;
        left: -200px;
    }

    .bg-blob-2 {
        width: 500px;
        height: 500px;
        background: #764ba2;
        bottom: -200px;
        right: -200px;
        animation-delay: -4s;
    }

    .bg-blob-3 {
        width: 300px;
        height: 300px;
        background: #f093fb;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-delay: -2s;
    }

    @keyframes blobMove {
        0%, 100% { transform: scale(1) translate(0, 0); }
        33% { transform: scale(1.1) translate(30px, -30px); }
        66% { transform: scale(0.9) translate(-20px, 20px); }
    }

    /* Grid pattern overlay */
    .bg-grid {
        position: fixed;
        inset: 0;
        background-image: 
            linear-gradient(rgba(102, 126, 234, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(102, 126, 234, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
    }

    /* Main container */
    .login-wrapper {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 480px;
        padding: 20px;
    }

    /* Back link */
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(255,255,255,0.5);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 32px;
        transition: all 0.3s;
    }

    .back-link:hover {
        color: #667eea;
        transform: translateX(-4px);
    }

    /* Login card */
    .login-card {
        background: rgba(26, 26, 46, 0.8);
        backdrop-filter: blur(30px);
        border: 1px solid rgba(102, 126, 234, 0.2);
        border-radius: 24px;
        padding: 48px 40px;
        box-shadow: 
            0 40px 80px rgba(0,0,0,0.4),
            0 0 0 1px rgba(255,255,255,0.05) inset;
        animation: cardIn 0.6s ease both;
    }

    @keyframes cardIn {
        from { 
            opacity: 0; 
            transform: translateY(30px) scale(0.95); 
        }
        to { 
            opacity: 1; 
            transform: translateY(0) scale(1); 
        }
    }

    /* Logo area */
    .logo-area {
        text-align: center;
        margin-bottom: 40px;
    }

    .logo-ring {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
        border: 1px solid rgba(102,126,234,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        padding: 12px;
    }

    .logo-ring img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 10px;
    }

    .login-title {
        font-size: 28px;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
    }

    .login-subtitle {
        font-size: 14px;
        color: rgba(255,255,255,0.4);
        font-weight: 400;
    }

    /* Form styles */
    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255,255,255,0.7);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255,255,255,0.3);
        font-size: 16px;
        pointer-events: none;
        transition: color 0.3s;
    }

    .form-input {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 14px 16px 14px 48px;
        font-size: 15px;
        color: #ffffff;
        transition: all 0.3s;
        outline: none;
    }

    .form-input::placeholder {
        color: rgba(255,255,255,0.2);
    }

    .form-input:focus {
        border-color: #667eea;
        background: rgba(102, 126, 234, 0.08);
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .form-input:focus + .input-icon,
    .input-wrapper:focus-within .input-icon {
        color: #667eea;
    }

    /* Password toggle */
    .password-toggle {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255,255,255,0.3);
        cursor: pointer;
        font-size: 16px;
        transition: color 0.3s;
        background: none;
        border: none;
        padding: 4px;
    }

    .password-toggle:hover {
        color: #667eea;
    }

    /* Forgot password */
    .forgot-link {
        display: block;
        text-align: right;
        color: #667eea;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        margin-top: -12px;
        margin-bottom: 28px;
        transition: color 0.3s;
    }

    .forgot-link:hover {
        color: #a78bfa;
    }

    /* Login button */
    .btn-login {
        width: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        letter-spacing: 0.3px;
    }

    .btn-login::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        transition: left 0.5s;
    }

    .btn-login:hover::before {
        left: 100%;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
        transform: translateY(0);
    }

    .btn-login:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }

    /* Loading spinner */
    .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: none;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Divider */
    .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 28px 0;
        color: rgba(255,255,255,0.2);
        font-size: 12px;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255,255,255,0.08);
    }

    /* Role badges */
    .role-badges {
        display: flex;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .role-badge {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 11px;
        color: rgba(255,255,255,0.4);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    /* Alert messages */
    .alert {
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .alert-error {
        background: rgba(255, 82, 82, 0.1);
        border: 1px solid rgba(255, 82, 82, 0.3);
        color: #ff8080;
    }

    .alert-success {
        background: rgba(0, 212, 170, 0.1);
        border: 1px solid rgba(0, 212, 170, 0.3);
        color: #00d4aa;
    }

    /* Footer text */
    .card-footer {
        text-align: center;
        margin-top: 28px;
        padding-top: 24px;
        border-top: 1px solid rgba(255,255,255,0.06);
    }

    .card-footer p {
        color: rgba(255,255,255,0.25);
        font-size: 12px;
    }

    /* Mobile */
    @media (max-width: 480px) {
        .login-card {
            padding: 36px 24px;
        }

        .login-title {
            font-size: 24px;
        }
    }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <!-- Background effects -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="bg-grid"></div>

    <!-- Login wrapper -->
    <div class="login-wrapper">
        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>

        <div class="login-card">
            <!-- Logo -->
            <div class="logo-area">
                <div class="logo-ring">
                    <img src="/static/logo.png" alt="TechAware">
                </div>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to your TechAware portal</p>
            </div>

            <!-- Alert message -->
            <div id="alert-box" style="display:none;"></div>

            <!-- Form -->
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="Enter your email"
                            autocomplete="email"
                            required
                        >
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >
                        <i class="fas fa-lock input-icon"></i>
                        <button 
                            type="button" 
                            class="password-toggle"
                            onclick="togglePassword()"
                        >
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <a href="/forgot-password" class="forgot-link">
                    Forgot password?
                </a>

                <button type="submit" class="btn-login" id="login-btn">
                    <div class="spinner" id="spinner"></div>
                    <span id="btn-text">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </span>
                </button>
            </form>

            <div class="card-footer">
                <p>© 2024 COMSATS University Islamabad</p>
            </div>
        </div>
    </div>

    <script>
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            pwd.type = 'password';
            icon.className = 'fas fa-eye';
        }
    }

    function showAlert(message, type) {
        const box = document.getElementById('alert-box');
        const icon = type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check';
        box.innerHTML = `
            <div class="alert alert-${type}">
                <i class="fas ${icon}"></i>
                ${message}
            </div>`;
        box.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btn-text');
        
        // Show loading
        btn.disabled = true;
        spinner.style.display = 'block';
        btnText.style.display = 'none';
        document.getElementById('alert-box').style.display = 'none';
        
        try {
            const res = await fetch('/api/unified/login', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await res.json();
            
            if (data.success) {
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = data.redirect_url;
                }, 800);
            } else {
                showAlert(data.message || 'Invalid email or password!', 'error');
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.style.display = 'flex';
            }
        } catch (err) {
            showAlert('Connection error. Please try again.', 'error');
            btn.disabled = false;
            spinner.style.display = 'none';
            btnText.style.display = 'flex';
        }
    });

    // Enter key support
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('login-form').dispatchEvent(
                new Event('submit')
            );
        }
    });
    </script>
</body>
</html>
